<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>page.json viewer</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
      color: #222;
      background: #fff;
    }

    .status {
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
      background: #f8fafc;
      color: #334155;
      font-size: 14px;
    }

    #content {
      padding: 16px;
    }
  </style>
</head>
<body>
  <div id="status" class="status">Loading page.json…</div>
  <main id="content"></main>

  <script>
    (async function renderFromJson() {
      const status = document.getElementById("status");
      const content = document.getElementById("content");

      try {
        const response = await fetch("./page.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status} ${response.statusText}`);
        }

        const data = await response.json();
        const title = data?.parse?.title || "page.json";
        const html = data?.parse?.text || "";

        document.title = title;
        content.innerHTML = html;
        status.textContent = `Rendered from page.json · ${title}`;
      } catch (error) {
        status.textContent = "Failed to load page.json";
        content.innerHTML = `<pre>${String(error)}</pre>`;
      }
    })();
  </script>
</body>
</html>
