<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprengel Museum Exhibitions Timeline</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css" rel="stylesheet" type="text/css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            flex-wrap: wrap;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.2em;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 20px;
            margin: 20px;
            border-radius: 6px;
            border-left: 4px solid #c33;
            display: none;
        }

        .error.show {
            display: block;
        }

        #timeline {
            width: 100%;
            height: 600px;
            background: white;
        }

        .info-panel {
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }

        .info-panel h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .exhibitions-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .exhibition-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .exhibition-card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            transform: translateY(-4px);
        }

        .exhibition-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .exhibition-card .date {
            color: #764ba2;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .exhibition-card img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            margin: 15px 0;
            max-height: 250px;
            object-fit: cover;
        }

        .exhibition-card .wiki-link {
            display: inline-block;
            margin-top: 10px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .exhibition-card .wiki-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.1em;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            flex-wrap: wrap;
            gap: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            color: #667eea;
            font-weight: 700;
        }

        .stat-label {
            color: #999;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .toggle-view {
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }

        .toggle-view label {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: #333;
            font-weight: 600;
        }

        .toggle-view input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .exhibitions-list {
                grid-template-columns: 1fr;
            }

            #timeline {
                height: 400px;
            }

            .stats {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 Sprengel Museum Exhibitions Timeline</h1>
            <p>Visual timeline of exhibitions at the Sprengel Museum Hannover</p>
        </div>

        <div class="controls">
            <button id="loadBtn">Load Timeline Data</button>
            <button id="resetBtn">Reset View</button>
            <button id="downloadBtn">Download Data (JSON)</button>
        </div>

        <div id="error" class="error"></div>

        <div id="loading" class="loading" style="display: none;">
            Loading exhibition data from Wikidata...
        </div>

        <div id="stats" class="stats" style="display: none;">
            <div class="stat">
                <div class="stat-value" id="countExhibitions">0</div>
                <div class="stat-label">Exhibitions</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="countYears">0</div>
                <div class="stat-label">Years Spanned</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="countImages">0</div>
                <div class="stat-label">With Images</div>
            </div>
        </div>

        <div class="toggle-view">
            <label>
                <input type="checkbox" id="viewToggle" checked>
                Show Timeline View (uncheck for List View)
            </label>
        </div>

        <div id="timelineView" class="view-section active">
            <div id="timeline"></div>
        </div>

        <div id="listView" class="view-section">
            <div class="info-panel">
                <h2>Exhibitions</h2>
            </div>
            <div id="exhibitionsList" class="exhibitions-list">
                <div class="no-data">No exhibitions loaded yet. Click "Load Timeline Data" to fetch data.</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
    <script>
        let timelineData = [];
        let timelineInstance = null;

        const WIKIDATA_ENDPOINT = "https://query.wikidata.org/sparql";
        const SPARQL_QUERY = `
#title: Visual Timeline of exhibitions at the Sprengel Museum
#defaultView:Timeline
SELECT ?exhibition ?exhibitionLabel ?date ?image WHERE {
  ?exhibition wdt:P31/wdt:P279* wd:Q464980; # Instance of or subclass of exhibition
              wdt:P276 wd:Q510144.          # Location: Sprengel Museum
  
  # Check for either inception or start time
  OPTIONAL { ?exhibition wdt:P571 ?date. }
  OPTIONAL { ?exhibition wdt:P580 ?date. }
  
  # Fetch the image if it exists
  OPTIONAL { ?exhibition wdt:P18 ?image. }
  
  FILTER(BOUND(?date)) # Ensures a date exists for the timeline
  
  SERVICE wikibase:label { bd:serviceParam wikibase:language "[AUTO_LANGUAGE],en,de". }
}
ORDER BY ?date`;

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '❌ ' + message;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }

        function showLoading(show = true) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        async function loadTimelineData() {
            showLoading(true);
            document.getElementById('error').classList.remove('show');

            try {
                const params = new URLSearchParams({
                    'query': SPARQL_QUERY,
                    'format': 'json'
                });

                const response = await fetch(`${WIKIDATA_ENDPOINT}?${params}`, {
                    headers: {
                        'User-Agent': 'linked-open-exhibition-timeline/1.0'
                    }
                });

                if (!response.ok) {
                    throw new Error(`API request failed with status ${response.status}`);
                }

                const data = await response.json();
                processResults(data);
            } catch (error) {
                console.error('Error loading data:', error);
                showError(`Failed to load data: ${error.message}`);
            } finally {
                showLoading(false);
            }
        }

        function processResults(data) {
            if (!data.results || !data.results.bindings || data.results.bindings.length === 0) {
                showError('No exhibitions found at the Sprengel Museum');
                return;
            }

            timelineData = data.results.bindings.map((binding, index) => ({
                id: index,
                content: binding.exhibitionLabel ? binding.exhibitionLabel.value : 'Unknown Exhibition',
                start: binding.date ? binding.date.value : null,
                image: binding.image ? binding.image.value : null,
                exhibition: binding.exhibition ? binding.exhibition.value : null
            })).filter(item => item.start); // Filter out items without dates

            if (timelineData.length === 0) {
                showError('No exhibitions with valid dates found');
                return;
            }

            updateStats();
            updateTimeline();
            updateExhibitionsList();
            document.getElementById('stats').style.display = 'flex';
        }

        function updateStats() {
            const count = timelineData.length;
            const withImages = timelineData.filter(item => item.image).length;
            
            const years = new Set();
            timelineData.forEach(item => {
                const year = new Date(item.start).getFullYear();
                years.add(year);
            });
            const yearRange = years.size > 0 ? Math.max(...years) - Math.min(...years) + 1 : 0;

            document.getElementById('countExhibitions').textContent = count;
            document.getElementById('countYears').textContent = yearRange;
            document.getElementById('countImages').textContent = withImages;
        }

        function updateTimeline() {
            const items = new vis.DataSet(
                timelineData.map((item, idx) => ({
                    id: idx,
                    content: `<div style="text-align: center; padding: 5px;"><strong>${item.content}</strong>${item.image ? '<br><img src="' + item.image + '" style="max-width: 150px; max-height: 150px; border-radius: 4px; margin-top: 5px;">' : ''}</div>`,
                    start: new Date(item.start),
                    title: item.content
                }))
            );

            const options = {
                margin: { item: 0 },
                orientation: { axis: 'bottom' },
                responsive: true,
                stack: false,
                align: 'center',
                timeaxis: {
                    scale: 'year',
                    step: 1
                },
                template: function() {
                    return '<div style="background-color: #667eea;"></div>';
                }
            };

            const container = document.getElementById('timeline');
            
            if (timelineInstance) {
                timelineInstance.destroy();
            }

            timelineInstance = new vis.Timeline(container, items, options);
        }

        function updateExhibitionsList() {
            const listContainer = document.getElementById('exhibitionsList');
            
            if (timelineData.length === 0) {
                listContainer.innerHTML = '<div class="no-data">No exhibitions found</div>';
                return;
            }

            listContainer.innerHTML = timelineData.map((item, idx) => `
                <div class="exhibition-card">
                    ${item.image ? `<img src="${item.image}" alt="${item.content}">` : '<div style="background: #f0f0f0; height: 180px; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #999;">No image available</div>'}
                    <h3>${item.content}</h3>
                    <div class="date">${formatDate(item.start)}</div>
                    ${item.exhibition ? `<a href="${item.exhibition}" target="_blank" class="wiki-link">View on Wikidata →</a>` : ''}
                </div>
            `).join('');
        }

        function formatDate(dateString) {
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            } catch {
                return dateString;
            }
        }

        function resetView() {
            if (timelineInstance) {
                timelineInstance.fit();
            }
        }

        function downloadData() {
            if (timelineData.length === 0) {
                showError('No data to download. Load data first.');
                return;
            }

            const dataToDownload = timelineData.map(item => ({
                exhibition: item.content,
                date: item.start,
                image: item.image,
                wikidata: item.exhibition
            }));

            const json = JSON.stringify(dataToDownload, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'sprengel-exhibitions-timeline.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Event listeners
        document.getElementById('loadBtn').addEventListener('click', loadTimelineData);
        document.getElementById('resetBtn').addEventListener('click', resetView);
        document.getElementById('downloadBtn').addEventListener('click', downloadData);

        document.getElementById('viewToggle').addEventListener('change', function() {
            const timelineView = document.getElementById('timelineView');
            const listView = document.getElementById('listView');
            
            if (this.checked) {
                timelineView.classList.add('active');
                listView.classList.remove('active');
                if (timelineInstance) {
                    timelineInstance.redraw();
                }
            } else {
                timelineView.classList.remove('active');
                listView.classList.add('active');
            }
        });

        // Load data automatically on page load
        window.addEventListener('load', function() {
            loadTimelineData();
        });
    </script>
</body>
</html>
